name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Tidy modules
        run: go mod tidy

      - name: Check formatting
        if: runner.os == 'Linux'
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - name: Race test
        if: runner.os == 'Linux'
        run: go test -race -v ./...

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          go build -o auto-bug-fix-test .
          ./auto-bug-fix-test version

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          go build -o auto-bug-fix-test.exe .
          ./auto-bug-fix-test.exe version

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Extract release notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          NOTES="${RUNNER_TEMP}/release-notes.md"
          sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '$ { /^## \[/d }' > "$NOTES"
          [ -s "$NOTES" ] || cp CHANGELOG.md "$NOTES"
          echo "NOTES_FILE=$NOTES" >> "$GITHUB_ENV"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --release-notes=${{ env.NOTES_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          always-auth: true

      - name: Verify version consistency
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match package.json version (${PKG_VERSION})"
            exit 1
          fi
          node scripts/check-version.js

      - name: Download release archives
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" --dir dist --pattern "*.tar.gz" --pattern "*.zip"
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" \) -print

      - name: Prepare npm platform packages
        run: node scripts/prepare-npm-platform-packages.js dist npm-platform

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          ROOT_PKG=$(node -p "require('./package.json').name")

          for dir in npm-platform/*; do
            [ -d "$dir" ] || continue
            PKG=$(node -p "require('./${dir}/package.json').name")
            if npm view "${PKG}@${VERSION}" version 2>/dev/null | grep -qx "${VERSION}"; then
              echo "npm package ${PKG}@${VERSION} already published; skipping"
              continue
            fi
            npm publish "./$dir" --access public --provenance
          done

          if npm view "${ROOT_PKG}@${VERSION}" version 2>/dev/null | grep -qx "${VERSION}"; then
            echo "npm package ${ROOT_PKG}@${VERSION} already published; skipping"
            exit 0
          fi
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
