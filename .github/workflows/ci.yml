name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.24']
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Check formatting
        if: runner.os == 'Linux'
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -race -v ./...

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          go build -o auto-bug-fix-test .
          ./auto-bug-fix-test version

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          go build -o auto-bug-fix-test.exe .
          ./auto-bug-fix-test.exe version
