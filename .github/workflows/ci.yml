name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: golangci-lint
        # Action v9 pairs with golangci-lint v2 (the .golangci.yml `version: "2"`
        # config format). 'latest' tracks the newest v2 release; pin to a specific
        # version once reproducible lint results are desired.
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Check formatting
        if: runner.os == 'Linux'
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - name: Race test
        if: runner.os == 'Linux'
        run: go test -race -v ./...

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          go build -o auto-bug-fix-test .
          ./auto-bug-fix-test version

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          go build -o auto-bug-fix-test.exe .
          ./auto-bug-fix-test.exe version

      - name: Verify version consistency
        if: runner.os == 'Linux'
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install npm metadata
        if: runner.os == 'Linux'
        run: npm ci --ignore-scripts

      - name: Check derived versions
        if: runner.os == 'Linux'
        run: node scripts/check-version.js

      - name: Verify spec/contract sync
        if: runner.os == 'Linux'
        run: node scripts/check-spec.js --local-only

      - name: Audit npm dependencies
        if: runner.os == 'Linux'
        run: npm audit --audit-level=high

      - name: npm package smoke
        if: runner.os == 'Linux'
        run: npm pack --dry-run
