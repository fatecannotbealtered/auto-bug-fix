version: 2

project_name: auto-bug-fix

before:
  hooks:
    - go mod tidy

builds:
  # main.go lives at the repo root (package main), so build the module root.
  - main: .
    binary: auto-bug-fix
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/fatecannotbealtered/auto-bug-fix/cmd.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    wrap_in_directory: false
    files:
      - none*

checksum:
  name_template: checksums.txt

signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--new-bundle-format"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

release:
  replace_existing_artifacts: true
